name: Beta Release

on:
  push:
    branches:
      - beta

permissions:
  contents: write

concurrency:
  group: beta-release
  cancel-in-progress: false

jobs:
  release-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Compute next beta version
        id: version
        run: |
          git fetch --tags --force

          latest_stable="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)"
          latest_beta="$(git tag --list 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$' | head -n 1)"

          version="$(LATEST_STABLE="$latest_stable" LATEST_BETA="$latest_beta" node <<'EOF'
          const fs = require('node:fs')

          const latestStable = process.env.LATEST_STABLE ?? ''
          const latestBeta = process.env.LATEST_BETA ?? ''
          const packageVersion = JSON.parse(fs.readFileSync('package.json', 'utf8')).version

          function parseStable(tag) {
            const match = tag.match(/^v(\d+)\.(\d+)\.(\d+)$/)
            if (!match) {
              return null
            }

            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
            }
          }

          function parseBeta(tag) {
            const match = tag.match(/^v(\d+)\.(\d+)\.(\d+)-beta\.(\d+)$/)
            if (!match) {
              return null
            }

            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
              prerelease: Number(match[4]),
            }
          }

          function compare(a, b) {
            if (a.major !== b.major) {
              return a.major - b.major
            }

            if (a.minor !== b.minor) {
              return a.minor - b.minor
            }

            return a.patch - b.patch
          }

          function parseFallback(version) {
            const stablePart = version.replace(/-.*$/, '')
            const match = stablePart.match(/^(\d+)\.(\d+)\.(\d+)$/)

            if (!match) {
              return { major: 0, minor: 1, patch: 0 }
            }

            return {
              major: Number(match[1]),
              minor: Number(match[2]),
              patch: Number(match[3]),
            }
          }

          const stable = parseStable(latestStable)
          const beta = parseBeta(latestBeta)

          let nextBase
          let nextPrerelease

          if (beta && (!stable || compare(beta, stable) > 0)) {
            nextBase = beta
            nextPrerelease = beta.prerelease + 1
          } else if (stable) {
            nextBase = {
              major: stable.major,
              minor: stable.minor,
              patch: stable.patch + 1,
            }
            nextPrerelease = 1
          } else if (beta) {
            nextBase = beta
            nextPrerelease = beta.prerelease + 1
          } else {
            nextBase = parseFallback(packageVersion)
            nextPrerelease = 1
          }

          process.stdout.write(
            `${nextBase.major}.${nextBase.minor}.${nextBase.patch}-beta.${nextPrerelease}`,
          )
          EOF
          )"

          tag="v$version"

          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stamp beta version into package metadata
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          VERSION="$VERSION" node <<'EOF'
          const fs = require('node:fs')

          const packageJsonPath = 'package.json'
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'))
          packageJson.version = process.env.VERSION
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`)
          EOF

      - name: Build the project
        run: pnpm run build

      - name: Create or update beta prerelease
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          {
            printf '## Changes\n\n'
            git log --format='- %s (%h)' -1 "$SHA"
            printf '\n## Commit\n\n- `%s`\n' "$SHA"
          } > beta-release-notes.md

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" ./dist/sc-custom-cards.js --repo "$REPO" --clobber
            gh release edit "$TAG" --repo "$REPO" --title "$TAG" --notes-file beta-release-notes.md --prerelease
            exit 0
          fi

          gh release create "$TAG" \
            ./dist/sc-custom-cards.js \
            --repo "$REPO" \
            --target "$SHA" \
            --title "$TAG" \
            --notes-file beta-release-notes.md \
            --prerelease
